# ============================================================
# Hugo + Blowfish 博客配置 — 最后的DBA
# ============================================================
baseURL: "https://lastdba.com/"
theme: "blowfish"
defaultContentLanguage: "zh"
hasCJKLanguage: true
enableRobotsTXT: true
enableEmoji: true
summaryLength: 80
pagination:
  pagerSize: 10

params:
  readingTime: 300

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  category: categories
  tag: tags
  series: series

outputs:
  home: ["HTML", "RSS", "JSON", "llms", "llms-full"]

outputFormats:
  llms:
    name: llms
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true
  llms-full:
    name: llmsfull
    mediaType: text/plain
    baseName: llms-full
    isPlainText: true
    notAlternative: true

imaging:
  anchor: Center

related:
  threshold: 0
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 100
    - name: date
      weight: 10

# 保留 Jekyll 文章的旧 URL 格式
permalinks:
  posts: "/:year/:month/:day/:slug/"

# 告诉 Hugo posts/ 是主要内容区
mainSections: ["posts"]
