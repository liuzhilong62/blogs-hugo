{{ $dest := .Destination }}
{{ if strings.HasPrefix $dest "../../../static/" }}
  {{ $dest = replace $dest "../../../static" "" }}
{{ end }}
{{ if strings.Contains $dest "lastdba.com/static/img/" }}
  {{ $dest = replace $dest "https://lastdba.com/static/img/" "/img/" }}
{{ end }}
<img src="{{ $dest | safeURL }}" alt="{{ .Text }}" {{ with .Title }}title="{{ . }}"{{ end }} />
